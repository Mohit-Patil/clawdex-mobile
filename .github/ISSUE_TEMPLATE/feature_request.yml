name: Feature request
description: Suggest an improvement to the app, CLI, or bridge
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
      placeholder: Describe the user or developer problem clearly.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: Describe the change you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: What other approaches did you consider?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      placeholder: Screenshots, links, workflows, or implementation notes.
